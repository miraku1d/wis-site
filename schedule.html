<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>練習日程 | Members Only</title>
    <link rel="stylesheet" href="style.css">

    <script>
        if (localStorage.getItem("memberAuthenticated") !== "true") {
            alert("このページを見るにはログインが必要です。");
            location.href = "login.html";
        }
    </script>

    <style>
        .schedule-page {
            background: #f7f4ef;
            min-height: 100vh;
        }

        .schedule-main {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px 60px;
        }

        .schedule-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .schedule-title h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #2b2b2b;
        }

        .schedule-title p {
            color: #666;
        }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .schedule-table th,
        .schedule-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .schedule-table th {
            background: #2b2b2b;
            color: #fff;
            font-weight: bold;
        }

        .schedule-table tr:last-child td {
            border-bottom: none;
        }

        .schedule-type {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: bold;
            background: #eee;
            color: #333;
        }

        .schedule-type.runthrough {
            background: #ffe1e8;
            color: #d9365f;
        }

        .back-btn-area {
            text-align: center;
            margin-top: 30px;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 999px;
            background: #2b2b2b;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #555;
        }

        @media (max-width: 700px) {
            .schedule-table {
                font-size: 0.9rem;
            }

            .schedule-table th,
            .schedule-table td {
                padding: 12px 8px;
            }
        }
    </style>
</head>

<body class="schedule-page">

    <main class="schedule-main">

        <div class="schedule-title">
            <h1>練習日程</h1>
            <p>今後の練習・通しの日程を確認できます。</p>
        </div>

        <table class="schedule-table">
            <thead>
                <tr>
                    <th>日程</th>
                    <th>時間</th>
                    <th>内容</th>
                    <th>場所</th>
                </tr>
            </thead>
            <tbody id="scheduleTableBody">
            </tbody>
        </table>

        <div class="back-btn-area">
            <a href="member.html" class="back-btn">メンバー限定ページに戻る</a>
        </div>

    </main>

    <script>
        const practiceSchedules = [
            {
                date: "2026-04-25",
                time: "18:00〜21:00",
                title: "通常練習",
                place: "大学体育館"
            },
            {
                date: "2026-04-28",
                time: "18:00〜21:00",
                title: "ジャンル練習",
                place: "湘南台文化センター"
            },
            {
                date: "2026-05-01",
                time: "18:00〜21:00",
                title: "通常練習",
                place: "大学体育館"
            },
            {
                date: "2026-05-05",
                time: "13:00〜18:00",
                title: "通し",
                place: "体育館"
            },
            {
                date: "2026-05-12",
                time: "13:00〜18:00",
                title: "通し",
                place: "体育館"
            }
        ];

        function formatDate(dateString) {
            const date = new Date(dateString);
            const weekdays = ["日", "月", "火", "水", "木", "金", "土"];

            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekday = weekdays[date.getDay()];

            return `${month}月${day}日（${weekday}）`;
        }

        function showScheduleTable() {
            const tableBody = document.getElementById("scheduleTableBody");

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const futureSchedules = practiceSchedules
                .filter(schedule => new Date(schedule.date) >= today)
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            if (futureSchedules.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="4">現在、表示できる練習日程はありません。</td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = futureSchedules.map(schedule => {
                const isRunthrough = schedule.title === "通し";

                return `
                    <tr>
                        <td>${formatDate(schedule.date)}</td>
                        <td>${schedule.time}</td>
                        <td>
                            <span class="schedule-type ${isRunthrough ? "runthrough" : ""}">
                                ${schedule.title}
                            </span>
                        </td>
                        <td>${schedule.place}</td>
                    </tr>
                `;
            }).join("");
        }

        showScheduleTable();
    </script>

</body>
</html>
