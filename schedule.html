<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>練習日程 | Members Only</title>
    <link rel="stylesheet" href="style.css">

    <script>
        if (localStorage.getItem("memberAuthenticated") !== "true") {
            alert("このページを見るにはログインが必要です。");
            location.href = "login.html";
        }
    </script>
</head>

<body class="schedule-page">

    <main class="schedule-main">

        <div class="schedule-title">
            <h1>練習日程</h1>
            <p>ジャンルを選択すると、該当する練習日程だけを表示できます。</p>
        </div>

        <div class="genre-filter-area">
            <button class="genre-filter-btn active" data-genre="all">すべて</button>
            <button class="genre-filter-btn" data-genre="hiphop">hiphop</button>
            <button class="genre-filter-btn" data-genre="無house">無house</button>
            <button class="genre-filter-btn" data-genre="限house">限house</button>
            <button class="genre-filter-btn" data-genre="pop">pop</button>
            <button class="genre-filter-btn" data-genre="lock">lock</button>
            <button class="genre-filter-btn" data-genre="punking">punking</button>
            <button class="genre-filter-btn" data-genre="jazz">jazz</button>
            <button class="genre-filter-btn" data-genre="girls">girls</button>
            <button class="genre-filter-btn" data-genre="break">break</button>
        </div>

        <div class="schedule-note">
            <p>
                月：無house・lock ／ 火：girls・punking ／ 水：break・限house ／ 木：jazz・OP ／ 金：hiphop・pop ／ 土日：全ジャンル
            </p>
            <p>
                5/3〜5/6は合宿、6/9〜6/12は小屋入り期間、6/13は本番です。
            </p>
        </div>

        <div class="schedule-table-wrap">
            <table class="schedule-table">
                <thead>
                    <tr>
                        <th>日程</th>
                        <th>時間</th>
                        <th>内容</th>
                        <th>ジャンル</th>
                        <th>場所</th>
                    </tr>
                </thead>
                <tbody id="scheduleTableBody">
                </tbody>
            </table>
        </div>

        <div class="back-btn-area">
            <a href="member.html" class="back-btn">メンバー限定ページに戻る</a>
        </div>

    </main>

    <script src="schedules.js"></script>

    <script>
        let selectedGenres = [];

        function getTypeClass(type) {
            if (type === "通し") return "runthrough";
            if (type === "合宿") return "camp";
            if (type === "小屋入り") return "theater";
            if (type === "本番") return "performance";
            return "";
        }

        function showScheduleTable() {
            const tableBody = document.getElementById("scheduleTableBody");

            const filteredSchedules = practiceSchedules.filter(schedule => {
                if (selectedGenres.length === 0) {
                    return true;
                }

                return selectedGenres.some(genre => schedule.genres.includes(genre));
            });

            if (filteredSchedules.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="5" class="empty-schedule">
                            該当する練習日程はありません。
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = filteredSchedules.map(schedule => {
                const typeClass = getTypeClass(schedule.type);

                return `
                    <tr>
                        <td>${formatDateJapanese(schedule.date)}</td>
                        <td>${schedule.time}</td>
                        <td>
                            <span class="schedule-type ${typeClass}">
                                ${schedule.title}
                            </span>
                        </td>
                        <td>${schedule.genres.join(" / ")}</td>
                        <td>${schedule.place}</td>
                    </tr>
                `;
            }).join("");
        }

        function setupGenreFilters() {
            const buttons = document.querySelectorAll(".genre-filter-btn");

            buttons.forEach(button => {
                button.addEventListener("click", () => {
                    const genre = button.dataset.genre;

                    if (genre === "all") {
                        selectedGenres = [];

                        buttons.forEach(btn => btn.classList.remove("active"));
                        button.classList.add("active");

                        showScheduleTable();
                        return;
                    }

                    const allButton = document.querySelector('[data-genre="all"]');
                    allButton.classList.remove("active");

                    if (selectedGenres.includes(genre)) {
                        selectedGenres = selectedGenres.filter(item => item !== genre);
                        button.classList.remove("active");
                    } else {
                        selectedGenres.push(genre);
                        button.classList.add("active");
                    }

                    if (selectedGenres.length === 0) {
                        allButton.classList.add("active");
                    }

                    showScheduleTable();
                });
            });
        }

        setupGenreFilters();
        showScheduleTable();
    </script>

</body>
</html>
